name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build & Typecheck (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx tsc --noEmit
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  test-api:
    name: API Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edulia
          POSTGRES_PASSWORD: edulia
          POSTGRES_DB: edulia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edulia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://edulia:edulia@localhost:5432/edulia
      SECRET_KEY: ci-test-secret-key
      REDIS_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: |
          PGPASSWORD=edulia psql -h localhost -U edulia -c "CREATE DATABASE edulia_test;" || true
      - run: python -m pytest app/tests/ -v --tb=short

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build-web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: apps/web/tests/results/
          retention-days: 7
