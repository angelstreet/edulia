name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Frontend: build + typecheck ─────────────────────────────────────────
  build-web:
    name: Build & Typecheck (Web)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx tsc --noEmit
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  # ─── 2. API: integration tests against seeded DB ────────────────────────────
  test-api:
    name: API Tests (pytest)
    runs-on: [self-hosted, Linux, X64]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: edulia
          POSTGRES_PASSWORD: edulia
          POSTGRES_DB: edulia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edulia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql://edulia:edulia@localhost:5432/edulia
      SECRET_KEY: ci-test-secret-key-not-for-prod
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: ""
      SMTP_HOST: ""
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt fpdf2
      - name: Run DB migrations
        run: alembic upgrade head
      - name: Seed demo data
        run: python ../../scripts/seed_demo.py
        env:
          DATABASE_URL: postgresql://edulia:edulia@localhost:5432/edulia
      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl -f http://localhost:8000/api/health || (echo "API failed to start" && exit 1)
      - name: Run API tests
        run: |
          python -m pytest app/tests/ -v --tb=short \
            --api-base-url=http://localhost:8000 \
            -x
        env:
          EDULIA_TEST_BASE_URL: http://localhost:8000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pytest-results
          path: apps/api/test-results/
          retention-days: 7

  # ─── 3. E2E: Playwright against staging ─────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: [self-hosted, Linux, X64]
    needs: build-web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'https://edulia.angelstreet.io' }}
          HUB_URL: ${{ vars.HUB_URL || 'https://eduliahub.angelstreet.io' }}
          E2E_PASSWORD: demo2026
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: apps/web/test-results/
          retention-days: 7
